services:
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    ports:
      - "27017:27017" # Porta padrão do MongoDB
    volumes:
      - mongodb_data:/data/db # Persistência de dados
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example # Senha do admin

volumes:
  mongodb_data:
